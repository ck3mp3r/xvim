---
name: xvim

path: .
windows:
  - name: code
    panes:
      - flex: 5
        commands: # each pane/window can run commands
          - command: nvim
      - flex: 2
        commands:
          - command: agent
            args:
              - --session
              - xvim
              - --model
              - github-copilot/claude-opus-4.6

  - name: misc
    panes:
      - flex: 1
      - flex: 1
